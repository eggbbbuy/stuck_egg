name: intraday-quotes

on:
  # 排程已停用：GitHub 對高頻 cron 會大量略過(實測整個上午沒跑)，
  # 改由本機 quote_loop.py 每 2 分鐘推 quotes.json。此 workflow 僅保留手動觸發當備援。
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: stuck-egg-quotes
  cancel-in-progress: false

jobs:
  quote:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install --quiet curl_cffi
      - name: Fetch live quotes
        run: python gen_quote.py
      - name: Commit & push if changed
        run: |
          git config user.name "stuck_egg-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -- quotes.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "intraday: 盤中報價 $(date -u +%H:%M)Z"
            git pull --rebase --autostash || true
            git push
          fi
