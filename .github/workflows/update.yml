name: update-stock-data

on:
  schedule:
    # 每週一～五 07:00 UTC（= 台灣 15:00，收盤後）自動更新
    - cron: '0 7 * * 1-5'
  workflow_dispatch: {}   # 也可在 Actions 頁面手動觸發

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install deps
        run: pip install --quiet curl_cffi
      - name: Regenerate data
        run: python update_all.py
      - name: Commit & push if changed
        run: |
          git config user.name "stuck_egg-bot"
          git config user.email "actions@users.noreply.github.com"
          git add -- *_tech.json *_fund.json *_val.json *_chip.json
          if git diff --staged --quiet; then
            echo "no changes"
          else
            git commit -m "auto: 每日更新股價/基本面 $(date -u +%Y-%m-%d)"
            git push
          fi
